services:
  mbox-viewer:
    build: .
    ports:
      - "${PORT:-9000}:9000"
    volumes:
      - "${MBOX_FILE:-/path/to/your-mail.mbox}:/data/mail.mbox:ro"
      - mbox-index:/index
      - "${ARCHIVE_HOST_DIR:-./mbox-viewer-archive}:/archive"
    environment:
      - MBOX_PATH=/data/mail.mbox
      - INDEX_PATH=/index/index.db
      - ARCHIVE_DIR=/archive
      - MBOX_NAME=${MBOX_NAME:-}

volumes:
  mbox-index:
