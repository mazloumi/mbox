services:
  mbox-viewer:
    build: .
    ports:
      # Bound to localhost (127.0.0.1) ON PURPOSE: this app has NO authentication and
      # NO HTTPS, so it must not be reachable from your network. Do not change this to
      # "0.0.0.0" / a bare "PORT:9000" unless you understand the exposure (see README).
      - "127.0.0.1:${PORT:-9000}:9000"
    volumes:
      - "${MBOX_FILE:?Set MBOX_FILE to the absolute path of your .mbox file — copy .env.example to .env}:/data/mail.mbox:ro"
      - mbox-index:/index
      - "${ARCHIVE_HOST_DIR:-./mbox-viewer-archive}:/archive"
    environment:
      - MBOX_PATH=/data/mail.mbox
      - INDEX_PATH=/index/index.db
      - ARCHIVE_DIR=/archive
      - MBOX_NAME=${MBOX_NAME:-}
      - SEMANTIC_SEARCH=${SEMANTIC_SEARCH:-}
      - ASSISTANT_ENABLED=${ASSISTANT_ENABLED:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ASSISTANT_MODEL=${ASSISTANT_MODEL:-claude-sonnet-4-6}
      - EMBED_BACKEND=${EMBED_BACKEND:-local}
      - EMBED_MODEL=${EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}

volumes:
  mbox-index:
