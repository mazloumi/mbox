<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mbox viewer</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/vendor/pico.classless.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Set theme before first paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem("theme") ||
          (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <header id="header">
    <span id="logo">📬 mbox viewer</span>
    <span id="header-actions">
      <button id="tab-folders" type="button" class="tab active" title="Browse Gmail labels">Folders</button>
      <button id="tab-files" type="button" class="tab" title="Browse attachments by type">Files</button>
      <button id="tab-ask" type="button" class="tab" title="Ask questions about your mail" hidden>Ask</button>
      <button id="archive-images" type="button" title="Download remote images for offline viewing">Archive remote images</button>
      <button id="theme-toggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </span>
  </header>
  <div id="app">
    <aside id="labels"><h2>Folders</h2><ul id="label-list"></ul></aside>
    <section id="list">
      <div id="searchbar">
        <button id="sidebar-toggle" type="button" title="Collapse sidebar">«</button>
        <input id="q" type="search" placeholder="Search mail and attachments...">
        <label id="semantic-search-label" title="Rank results by meaning using local AI (instead of keyword matching)" hidden><input id="semantic-search" type="checkbox"> Semantic Search</label>
        <div id="filters">
          <input id="filter-from" type="date" title="From date">
          <input id="filter-to" type="date" title="To date">
          <input id="filter-sender" type="search" placeholder="from…" title="Sender contains">
          <label><input id="filter-hasatt" type="checkbox"> has attachment</label>
          <select id="filter-sort">
            <option value="date_desc">Newest first</option>
            <option value="date_asc">Oldest first</option>
          </select>
        </div>
        <button id="download-all" type="button" hidden>Download all</button>
      </div>
      <ul id="message-list"></ul>
    </section>
    <section id="reader">
      <div id="reader-header"></div>
      <div id="reader-attachments"></div>
      <iframe id="reader-body" sandbox=""></iframe>
      <iframe id="reader-pdf" hidden></iframe>
      <pre id="reader-text" hidden></pre>
      <img id="reader-image" hidden>
      <audio id="reader-audio" controls hidden></audio>
      <video id="reader-video" controls hidden></video>
      <div id="reader-table" hidden></div>
    </section>
    <section id="chat">
      <div id="chat-log"></div>
      <div id="chat-building" hidden></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Ask about your mail…" autocomplete="off">
        <button type="submit">Send</button>
      </form>
    </section>
  </div>
  <footer id="footer">
    <span id="mbox-name"></span>
    <span id="index-state"></span>
    <span id="archive-state"></span>
    <span id="integrity"></span>
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
